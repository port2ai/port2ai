<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Proxmox SDN/BGP Work Phases Flow Chart</title>
  <desc id="desc">Flow chart showing five project phases with estimated level of effort for each phase.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2d3748"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f7f9fb; }
      .title { fill: #182230; font-family: Arial, Helvetica, sans-serif; font-size: 46px; font-weight: 700; }
      .subtitle { fill: #526071; font-family: Arial, Helvetica, sans-serif; font-size: 24px; }
      .card { rx: 18; ry: 18; stroke-width: 2; filter: url(#softShadow); }
      .phase { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; }
      .phaseNum { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 34px; font-weight: 700; }
      .body { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 22px; }
      .small { fill: #4a5568; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .label { fill: #182230; font-family: Arial, Helvetica, sans-serif; font-size: 19px; font-weight: 700; }
      .chipText { fill: #ffffff; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; }
      .note { fill: #344054; font-family: Arial, Helvetica, sans-serif; font-size: 21px; }
      .arrow { stroke: #2d3748; stroke-width: 5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1050"/>
  <text class="title" x="90" y="86">Proxmox SDN/BGP Integration Work Phases</text>
  <text class="subtitle" x="90" y="126">Client-facing execution flow with estimated level of effort by phase</text>

  <rect x="90" y="158" width="1620" height="92" rx="16" fill="#eef4ff" stroke="#b2ccff" stroke-width="2"/>
  <text class="label" x="122" y="198">Total estimated effort:</text>
  <text class="note" x="350" y="198">13-29 hours, typically 2-4 working days after access and requirements are confirmed.</text>
  <text class="label" x="122" y="228">Control point:</text>
  <text class="note" x="266" y="228">Discovery and design should be approved before any production routing change.</text>

  <!-- Row 1 cards -->
  <g transform="translate(90,315)">
    <rect class="card" width="300" height="265" fill="#295b6f" stroke="#214a5a"/>
    <circle cx="42" cy="43" r="25" fill="#153d4c"/>
    <text class="phaseNum" x="32" y="55">1</text>
    <text class="phase" x="82" y="50">Discovery and</text>
    <text class="phase" x="82" y="80">Access Review</text>
    <rect x="28" y="104" width="150" height="38" rx="19" fill="#d66853"/>
    <text class="chipText" x="48" y="130">2-4 hrs</text>
    <text class="body" x="28" y="176">Confirm topology,</text>
    <text class="body" x="28" y="205">access, versions,</text>
    <text class="body" x="28" y="234">risk, and gaps.</text>
  </g>

  <g transform="translate(455,315)">
    <rect class="card" width="300" height="265" fill="#3f7d59" stroke="#326346"/>
    <circle cx="42" cy="43" r="25" fill="#24513a"/>
    <text class="phaseNum" x="32" y="55">2</text>
    <text class="phase" x="82" y="50">Architecture and</text>
    <text class="phase" x="82" y="80">Change Plan</text>
    <rect x="28" y="104" width="150" height="38" rx="19" fill="#d89b35"/>
    <text class="chipText" x="48" y="130">3-6 hrs</text>
    <text class="body" x="28" y="176">Design SDN/BGP,</text>
    <text class="body" x="28" y="205">route policy,</text>
    <text class="body" x="28" y="234">rollback, testing.</text>
  </g>

  <g transform="translate(820,315)">
    <rect class="card" width="300" height="265" fill="#6b5b95" stroke="#554878"/>
    <circle cx="42" cy="43" r="25" fill="#463a68"/>
    <text class="phaseNum" x="32" y="55">3</text>
    <text class="phase" x="82" y="50">Configuration and</text>
    <text class="phase" x="82" y="80">Integration</text>
    <rect x="28" y="104" width="165" height="38" rx="19" fill="#2f6f9f"/>
    <text class="chipText" x="48" y="130">4-10 hrs</text>
    <text class="body" x="28" y="176">Apply Proxmox</text>
    <text class="body" x="28" y="205">SDN, BGP/EVPN,</text>
    <text class="body" x="28" y="234">and filters.</text>
  </g>

  <g transform="translate(1185,315)">
    <rect class="card" width="300" height="265" fill="#ba5a31" stroke="#984927"/>
    <circle cx="42" cy="43" r="25" fill="#7b351d"/>
    <text class="phaseNum" x="32" y="55">4</text>
    <text class="phase" x="82" y="50">Testing and</text>
    <text class="phase" x="82" y="80">Stabilization</text>
    <rect x="28" y="104" width="150" height="38" rx="19" fill="#2d6a4f"/>
    <text class="chipText" x="48" y="130">2-5 hrs</text>
    <text class="body" x="28" y="176">Verify peers,</text>
    <text class="body" x="28" y="205">routes, workload</text>
    <text class="body" x="28" y="234">traffic, logs.</text>
  </g>

  <!-- Row 1 arrows -->
  <path class="arrow" d="M 400 448 L 443 448"/>
  <path class="arrow" d="M 765 448 L 808 448"/>
  <path class="arrow" d="M 1130 448 L 1173 448"/>

  <!-- Down connector -->
  <path class="arrow" d="M 1335 595 C 1335 670, 1035 670, 1035 725"/>

  <!-- Row 2 final card -->
  <g transform="translate(735,735)">
    <rect class="card" width="600" height="205" fill="#2f4f4f" stroke="#233d3d"/>
    <circle cx="54" cy="52" r="28" fill="#1d3434"/>
    <text class="phaseNum" x="44" y="64">5</text>
    <text class="phase" x="96" y="56">Final Docs and Handoff</text>
    <rect x="420" y="32" width="150" height="38" rx="19" fill="#c77d1f"/>
    <text class="chipText" x="440" y="58">2-4 hrs</text>
    <text class="body" x="34" y="116">Deliver runbook, topology diagram, config summary,</text>
    <text class="body" x="34" y="147">validation evidence, rollback notes, and next steps.</text>
  </g>

  <!-- Bottom notes -->
  <rect x="90" y="930" width="520" height="58" rx="12" fill="#fff7ed" stroke="#fed7aa" stroke-width="2"/>
  <text class="small" x="116" y="966">Milestone gate: client approval required after Phase 2.</text>

  <rect x="1230" y="930" width="480" height="58" rx="12" fill="#ecfdf3" stroke="#abefc6" stroke-width="2"/>
  <text class="small" x="1256" y="966">Acceptance: stable peers, routes, connectivity, docs.</text>
</svg>
